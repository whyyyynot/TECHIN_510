<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Evolution of Porsche 911</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/timeline.css">
    <link rel="stylesheet" href="css/game.css">
</head>
<body>
    <!-- Hero Section -->
    <section id="hero" class="hero-section">
        <div class="hero-content">
            <h1>The Evolution of Porsche 911</h1>
            <p>Experience the legendary journey of an automotive icon</p>
        </div>
    </section>

    <!-- Interactive Timeline -->
    <section id="timeline" class="timeline-section">
        <h2>The Evolution Timeline</h2>
        <div class="timeline-container">
            <!-- Timeline content will be dynamically generated -->
        </div>
    </section>

    <!-- Engine Sound Slider -->
    <section id="engine-sounds" class="engine-section">
        <h2>Experience the Sound Evolution</h2>
        <div class="sound-slider">
            <input type="range" min="1963" max="2024" value="1963" class="year-slider">
            <div class="sound-display">
                <span class="current-year">1963</span>
                <audio id="engine-audio" controls></audio>
            </div>
        </div>
    </section>

    <!-- Build the Evolution Game -->
    <section id="build-game" class="game-section">
        <h2>Build Your Own Evolution</h2>
        <div class="game-container">
            <div class="parts-selection">
                <!-- Parts selection interface -->
            </div>
            <div class="preview-area">
                <!-- Preview of the custom build -->
            </div>
        </div>
    </section>

    <!-- What-if Generator -->
    <section id="what-if" class="generator-section">
        <h2>Your Custom 911</h2>
        <div class="generator-container">
            <div class="final-preview">
                <!-- Final composite image -->
            </div>
            <div class="description">
                <!-- Generated description -->
            </div>
            <button class="share-button">Share Your Creation</button>
        </div>
    </section>

    <footer>
        <p>Created by Hanyang Wang | TECHIN 510 Project</p>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/timeline.js"></script>
    <script src="js/game.js"></script>
    <script src="js/generator.js"></script>
</body>
</html>
